<article class="bg-surface border border-line rounded-lg shadow-card p-3 group">
  <header class="flex items-start justify-between gap-2 mb-1.5">
    <h3 class="text-sm font-medium leading-snug">{{ task().title }}</h3>
    <span class="shrink-0 text-[11px] uppercase tracking-wide font-medium px-1.5 py-0.5 rounded" [class]="categoryColor()">
      {{ categoryLabel() }}
    </span>
  </header>

  @if (task().description) {
    <p class="text-xs text-muted line-clamp-2 mb-2">{{ task().description }}</p>
  }

  @if (canMutate()) {
    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
      <button type="button" (click)="edit.emit(task())" class="text-xs text-muted hover:text-ink">
        Edit
      </button>
      <button type="button" (click)="remove.emit(task())" class="text-xs text-muted hover:text-red-500">
        Delete
      </button>
    </div>
  }
</article>
